<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Plataforma oficial do TorinnoFC para jogadores, partidas, ranking e desempenho."
    />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="TorinnoFC" />
    <meta
      property="og:description"
      content="Plataforma oficial do TorinnoFC para elenco, partidas e desempenho."
    />
    <meta property="og:image" content="https://torrino-fc-site.vercel.app/assets/banner-torrino.png" />
    <meta property="og:url" content="https://torrino-fc-site.vercel.app" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TorinnoFC" />
    <meta
      name="twitter:description"
      content="Plataforma oficial do TorinnoFC para elenco, partidas e desempenho."
    />
    <meta name="twitter:image" content="https://torrino-fc-site.vercel.app/assets/banner-torrino.png" />
    <link rel="preload" as="image" href="/assets/banner-torrino.png" />
    <link rel="preload" as="image" href="/assets/logo-torrino.png" />
    <link rel="icon" type="image/png" href="/assets/logo-torrino.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#4a0712" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oxanium:wght@500;600;700;800&family=Sora:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <title>TorinnoFC</title>
    <style>
      #root:empty::before {
        content: "";
        position: fixed;
        inset: 0;
        background:
          linear-gradient(90deg, rgba(5, 7, 10, 0.96), rgba(5, 7, 10, 0.56), rgba(5, 7, 10, 0.18)),
          url("/assets/banner-torrino.png") center / cover no-repeat,
          #05070a;
      }
      .vercel-cover {
        min-height: 100vh;
        position: fixed;
        inset: 0;
        display: flex;
        align-items: flex-end;
        overflow: hidden;
        padding: clamp(28px, 6vw, 76px);
        color: #fff7ed;
        background: #05070a;
        font-family: Arial, sans-serif;
        isolation: isolate;
      }
      .vercel-cover > img {
        position: absolute;
        inset: 0;
        z-index: -2;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .vercel-cover::after {
        content: "";
        position: absolute;
        inset: 0;
        z-index: -1;
        background:
          linear-gradient(90deg, rgba(5, 7, 10, 0.96), rgba(5, 7, 10, 0.58), rgba(5, 7, 10, 0.18)),
          linear-gradient(0deg, rgba(5, 7, 10, 0.82), transparent 58%);
      }
      .vercel-cover section {
        display: grid;
        gap: 12px;
      }
      .vercel-cover section > img {
        width: clamp(72px, 9vw, 118px);
        height: auto;
        filter: drop-shadow(0 18px 28px rgba(0, 0, 0, 0.55));
      }
      .vercel-cover span,
      .vercel-cover p {
        margin: 0;
        color: #d4a24c;
        font-size: 12px;
        font-weight: 900;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }
      .vercel-cover h1 {
        margin: 0;
        font-size: 128px;
        line-height: 0.82;
        letter-spacing: 0;
      }
      @media (max-width: 900px) {
        .vercel-cover h1 {
          font-size: 96px;
        }
      }
      @media (max-width: 640px) {
        .vercel-cover {
          padding: 34px 20px;
        }
        .vercel-cover h1 {
          font-size: 68px;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <main class="vercel-cover" aria-label="TorinnoFC">
        <img src="/assets/banner-torrino.png" alt="" />
        <section>
          <img src="/assets/logo-torrino.png" alt="TorinnoFC" />
          <span>EA SPORTS FC | PRO CLUBS</span>
          <h1>TorinnoFC</h1>
          <p>Digital</p>
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
